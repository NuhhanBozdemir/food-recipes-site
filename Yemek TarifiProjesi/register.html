<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <!-- Arka planda karartma overlay -->
    <div class="overlay"></div>

    <!-- Kayıt Formu -->
    <div class="container d-flex justify-content-center align-items-center">
        <div class="register-card">
            <div class="register-card-header">
                Kayıt Ol
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Ad Soyad</label>
                    <input type="text" class="form-control" id="name" placeholder="Adınızı ve soyadınızı girin">
                    <div class="invalid-feedback">Ad soyad alanı boş bırakılamaz.</div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">E-posta</label>
                    <input type="email" class="form-control" id="email" placeholder="E-posta adresinizi girin">
                    <div class="invalid-feedback">Lütfen geçerli bir e-posta adresi girin.</div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Şifre</label>
                    <input type="password" class="form-control" id="password" placeholder="Şifrenizi girin">
                    <div class="invalid-feedback">Şifre en az 6 karakter olmalıdır.</div>
                </div>
                <div class="mb-3">
                    <label for="confirm-password" class="form-label">Şifreyi Onayla</label>
                    <input type="password" class="form-control" id="confirm-password" placeholder="Şifrenizi tekrar girin">
                    <div class="invalid-feedback">Şifreler eşleşmiyor.</div>
                </div>
                <button type="submit" class="btn btn-success w-100">Kayıt Ol</button>
                <p class="text-center mt-3" style="color: gray;">Zaten bir hesabınız var mı? <a href="login.html" style="color: #28a745; text-decoration: none;">Giriş Yap</a></p>
            </form>
        </div>
    </div>

    <script src="register.js"></script>
</body>

</html>
