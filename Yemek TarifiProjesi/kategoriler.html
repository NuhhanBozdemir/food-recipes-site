<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kategoriler</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7fa;
            color: #333;
        }

        .navbar {
            background-color: #2c3e50;
        }

        nav {
          margin-top: -60px; /* Navbar'ın üst boşluğunu azaltıyoruz */
         }

        .navbar-brand {
            color: #ecf0f1 !important;
        }

        .container {
            margin-top: 60px;
        }

        h2 {
            font-size: 36px;
            font-weight: 600;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 40px;
        }

        .category-card {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .category-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: all 0.3s ease-in-out;
        }

        .category-card:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
        }

        .category-card:hover img {
            transform: scale(1.1);
        }

        .category-card-body {
            padding: 20px;
            text-align: center;
        }

        .category-card-body h5 {
            font-size: 22px;
            font-weight: 600;
            color: #2c3e50;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .col-md-4 {
            flex: 1 1 calc(33.333% - 30px);
            max-width: calc(33.333% - 30px);
        }

        @media (max-width: 768px) {
            .col-md-4 {
                flex: 1 1 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Lezzetli Tarifler</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto"> <!-- Menü öğelerini ortalamak için mx-auto eklendi -->
                    <li class="nav-item"><a class="nav-link" href="index.html">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link" href="kategoriler.html">Kategoriler</a></li>
                    <li class="nav-item"><a class="nav-link" href="hakkinda.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Giriş Yap</a></li> 
                </ul>
            </div>
        </div>
    </nav>
 
    <div class="container my-5">
        <h2>Kategori Seçin</h2>

        <div class="row">
            <!-- Kahvaltı Kategorisi -->
            <div class="col-md-4">
                <div class="category-card" onclick="window.location.href='kahvalti.html'">
                    <img src="resimler/kahvaltı/kahvaltı.jpg" alt="Kahvaltı">
                    <div class="category-card-body">
                        <h5>Kahvaltı</h5>
                    </div>
                </div>
            </div>

            <!-- Ana Yemek Kategorisi -->
            <div class="col-md-4">
                <div class="category-card" onclick="window.location.href='anayemek.html'">
                    <img src="resimler/Ana yemek/ana yemek.jpg" alt="Ana Yemek">
                    <div class="category-card-body">
                        <h5>Ana Yemek</h5>
                    </div>
                </div>
            </div>

            <!-- Tatlılar Kategorisi -->
            <div class="col-md-4">
                <div class="category-card" onclick="window.location.href='tatlilar.html'">
                    <img src="resimler/tatlılar/tatlılar.jpg" alt="Tatlılar">
                    <div class="category-card-body">
                        <h5>Tatlılar</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Çorbalar Kategorisi -->
            <div class="col-md-4">
                <div class="category-card" onclick="window.location.href='corbalar.html'">
                    <img src="resimler/Çorbalar/çorbalar.jpg" alt="Çorbalar">
                    <div class="category-card-body">
                        <h5>Çorbalar</h5>
                    </div>
                </div>
            </div>

            <!-- Makarnalar Kategorisi -->
            <div class="col-md-4">
                <div class="category-card" onclick="window.location.href='makarnalar.html'">
                    <img src="resimler/Makarnalar/makarnalar.jpg" alt="Makarnalar">
                    <div class="category-card-body">
                        <h5>Makarnalar</h5>
                    </div>
                </div>
            </div>

            <!-- Salatalar Kategorisi -->
            <div class="col-md-4">
                <div class="category-card" onclick="window.location.href='salatalar.html'">
                    <img src="resimler/salatalar/salatalar.jpg" alt="Salatalar">
                    <div class="category-card-body">
                        <h5>Salatalar</h5>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
